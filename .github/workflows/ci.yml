name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      # npm install (not ci) so the job is resilient to the lockfile being
      # regenerated in the build PR; swap to `npm ci` once that lands.
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test
      # Runs once the build PR adds the `build` script; a no-op until then.
      - run: npm run build --if-present
