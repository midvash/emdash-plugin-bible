name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test (with coverage thresholds)
        run: npm run coverage

      - name: Build (npm dist)
        run: npm run build

      - name: Validate marketplace bundle
        run: npx emdash plugin validate

  changeset:
    name: changeset present
    # Every human PR must add a changeset so versions/CHANGELOG bump correctly.
    # For docs/CI-only PRs that shouldn't release, add an empty one:
    #   npx changeset add --empty
    # Exempt: Dependabot (dev-deps/Actions bumps) and the Changesets release PR
    # (the "changeset-release/*" branch consumes changesets, so it has none left).
    if: >-
      github.event_name == 'pull_request' &&
      github.actor != 'dependabot[bot]' &&
      !startsWith(github.head_ref, 'changeset-release')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Require a changeset
        run: npx changeset status --since=origin/${{ github.base_ref }}
