name: Release

# On every push to main, Changesets either:
#   • opens/updates a "Version Packages" PR (when unreleased changesets exist), or
#   • publishes to npm + creates a GitHub Release (when that PR is merged).
on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write # create tags + GitHub Releases, push the version PR
  pull-requests: write # open/update the "Version Packages" PR
  id-token: write # npm provenance (OIDC)

jobs:
  release:
    name: Version / publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          # Use a PAT (RELEASE_PR_TOKEN) when available so the "Version Packages"
          # PR is authored by a user, not the github-actions[bot] — which means
          # opening/updating that PR DOES trigger the CI workflow (the default
          # GITHUB_TOKEN is intentionally barred from doing that, as an anti-loop
          # guard). Falls back to GITHUB_TOKEN if the secret isn't set, so the
          # release flow still works (the version PR just won't run CI).
          GITHUB_TOKEN: ${{ secrets.RELEASE_PR_TOKEN || secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
